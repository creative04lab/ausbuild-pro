name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/ausbuild/pro
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

      - name: Prepare mobile HTML
        run: |
          cp AusBuild-Pro-V4-Free.html app/src/main/assets/index.html
          python3 << 'PYEOF'
          import re

          with open('app/src/main/assets/index.html', 'r') as f:
              html = f.read()

          # Prevent zoom on mobile
          html = html.replace(
              'width=device-width, initial-scale=1.0',
              'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'
          )

          # --- COMPREHENSIVE MOBILE CSS ---
          mobile_css = '''
          @media (max-width: 768px) {
            nav { flex-wrap: wrap; height: auto !important; padding: 8px 12px !important; gap: 6px; }
            nav > div:first-child { width: 100%; text-align: center; font-size: 14px !important; }
            #nav-tabs { width: 100%; display: flex; justify-content: center; gap: 4px; overflow-x: auto; }
            #nav-tabs .tab-btn { padding: 6px 12px !important; font-size: 11px !important; white-space: nowrap; }
            nav > div:last-child { display: none; }
            #tab-calc > div, #tab-design > div, #tab-quote > div {
              flex-direction: column !important; overflow-y: auto !important; height: auto !important;
            }
            body { overflow: auto !important; height: auto !important; min-height: 100vh; }
            .flex-1.overflow-hidden { overflow: auto !important; height: auto !important; }
            .tab-content.active { height: auto !important; min-height: calc(100vh - 80px); overflow-y: auto !important; }
            #tab-calc > div > div:first-child { width: 100% !important; max-width: 100% !important; border-right: none !important; border-bottom: 1px solid #e5e7eb; }
            #tab-calc > div > div:last-child { width: 100% !important; }
            #tab-design > div > div:first-child { width: 100% !important; min-height: 45vh; max-height: 50vh; border-right: none !important; border-bottom: 2px solid #4f46e5; }
            #tab-design > div > div:last-child { width: 100% !important; min-height: 50vh; }
            #tab-design .draw-tool { padding: 4px 6px !important; font-size: 10px !important; }
            #tab-design .bg-white.border-b { flex-wrap: wrap; gap: 3px !important; padding: 4px 6px !important; }
            #penWidth { font-size: 10px !important; padding: 2px 4px !important; }
            #penColor { width: 22px !important; height: 22px !important; }
            #tab-design .view-btn { padding: 3px 6px !important; font-size: 9px !important; }
            #aiPromptInput { font-size: 11px !important; min-height: 36px !important; max-height: 60px !important; }
            #generateBtn { min-width: 65px !important; padding: 4px 8px !important; font-size: 10px !important; }
            #tab-design .px-3.py-1\\.5 { flex-wrap: wrap; padding: 4px 8px !important; gap: 4px; }
            #tab-design .px-3.py-1\\.5 > div { font-size: 9px !important; }
            #tab-quote > div > div:first-child { width: 100% !important; max-width: 100% !important; border-right: none !important; border-bottom: 1px solid #e5e7eb; }
            #tab-quote > div > div:last-child { width: 100% !important; }
            select, input, button { font-size: 14px !important; min-height: 36px; }
            .grid-cols-3 { grid-template-columns: 1fr !important; }
            .grid-cols-2 { grid-template-columns: 1fr !important; }
            table { font-size: 11px !important; }
            table th, table td { padding: 4px 6px !important; }
          }
          @media (max-width: 400px) {
            #nav-tabs .tab-btn { padding: 4px 8px !important; font-size: 10px !important; }
            nav > div:first-child { font-size: 12px !important; }
            #tab-design .draw-tool { font-size: 9px !important; padding: 3px 5px !important; }
          }
          * { -webkit-tap-highlight-color: transparent; }
          '''

          html = html.replace('</style>', mobile_css + '\n</style>')
          html = html.replace('h-screen flex flex-col overflow-hidden', 'min-h-screen flex flex-col')

          # Fix real-time calculator updates
          html = html.replace('id="totalArea" onchange="calcYield()"', 'id="totalArea" oninput="calcYield()" onchange="calcYield()"')
          html = html.replace('id="frontage" onchange="calcYield()"', 'id="frontage" oninput="calcYield()" onchange="calcYield()"')
          html = html.replace('id="depth">', 'id="depth" oninput="calcYield()" onchange="calcYield()">')
          html = html.replace('id="truncation">', 'id="truncation" oninput="calcYield()" onchange="calcYield()">')
          html = html.replace('id="isBattleaxe"', 'id="isBattleaxe" onchange="calcYield()"')

          with open('app/src/main/assets/index.html', 'w') as f:
              f.write(html)

          print('HTML mobile CSS applied successfully')
          PYEOF

      - name: Strip trial elements for Pro version
        run: |
          python3 << 'PYEOF'
          import re

          with open('app/src/main/assets/index.html', 'r') as f:
              html = f.read()

          # 1. Change title
          html = html.replace('AusBuild Pro V4 \u2014 Free Trial', 'AusBuild Pro V4')

          # 2. Remove watermark CSS block
          html = re.sub(
              r'/\*\s*Trial Watermark\s*\*/.*?\.trial-banner\s+a\s*\{[^}]*\}',
              '/* Pro Version */',
              html, flags=re.DOTALL
          )

          # 3. Remove watermark overlay div
          html = re.sub(r'<div class="watermark-overlay"></div>', '', html)

          # 4. Remove FREE TRIAL badge
          html = re.sub(r'<span[^>]*class="[^"]*bg-yellow[^"]*"[^>]*>[^<]*FREE TRIAL[^<]*</span>', '', html)

          # 5. Remove trial banner in nav
          html = re.sub(r'Free Trial Version\s*[^<]*<a[^>]*href="[^"]*gumroad[^"]*"[^>]*>[^<]*Upgrade to Pro[^<]*</a>', 'AusBuild Pro V4', html)

          # 6. Remove trial upgrade banner from JS
          html = re.sub(r"//\s*Trial upgrade banner\s*\n\s*html \+= `[^`]*FREE TRIAL VERSION[^`]*`;", '// Pro Version', html, flags=re.DOTALL)

          # 7. Replace remaining text references
          html = html.replace('FREE TRIAL VERSION', 'PRO VERSION')
          html = html.replace('FREE TRIAL', 'PRO')
          html = html.replace('Free Trial Version', 'AusBuild Pro V4')
          html = html.replace('Free Trial', 'Pro')

          # 8. Remove gumroad links
          html = re.sub(r'<a[^>]*href="[^"]*gumroad[^"]*"[^>]*>.*?</a>', '', html, flags=re.DOTALL)

          # 9. Remove Login button
          html = re.sub(r"<button[^>]*onclick=\"alert\('Login requires.*?</button>", '', html, flags=re.DOTALL)

          with open('app/src/main/assets/index.html', 'w') as f:
              f.write(html)

          print('Trial elements stripped - Pro version ready')
          PYEOF

      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.ausbuild.pro">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="AusBuild Pro"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboard|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          XMLEOF

      - name: Create MainActivity.java
        run: |
          cat > app/src/main/java/com/ausbuild/pro/MainActivity.java << 'JAVAEOF'
          package com.ausbuild.pro;

          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.view.Window;
          import android.view.WindowManager;

          public class MainActivity extends Activity {
              private WebView webView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN
                  );

                  webView = new WebView(this);
                  setContentView(webView);

                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
            s.setAllowUniversalAccessFromFileURLs(true);
                  s.setLoadWithOverviewMode(true);
                  s.setUseWideViewPort(true);
                  s.setBuiltInZoomControls(false);
                  s.setDisplayZoomControls(false);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);

                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          JAVAEOF

      - name: Create resource files
        run: |
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="android:Theme.Material.Light.NoActionBar">
              <item name="android:statusBarColor">#0d1b3e</item>
              <item name="android:navigationBarColor">#0d1b3e</item>
            </style>
          </resources>
          EOF

          python3 << 'PYEOF'
          import struct, zlib
          def create_png(w, h, color):
              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              raw = b''
              for y in range(h):
                  raw += b'\x00'
                  for x in range(w):
                      cx, cy = x - w//2, y - h//2
                      if cx*cx + cy*cy < (w//2 - 2)**2:
                          raw += bytes(color)
                      else:
                          raw += b'\x00\x00\x00\x00'
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 6, 0, 0, 0)) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')
          with open('app/src/main/res/drawable/ic_launcher.png', 'wb') as f:
              f.write(create_png(48, 48, (13, 27, 62, 255)))
          PYEOF

      - name: Create Gradle files
        run: |
          cat > settings.gradle << 'EOF'
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.ausbuild.pro'
            compileSdk 34
            defaultConfig {
              applicationId "com.ausbuild.pro"
              minSdk 24
              targetSdk 34
              versionCode 4
              versionName "4.0.3"
            }
            buildTypes { release { minifyEnabled false } }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
            lint { abortOnError false }
          }
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

      - name: Build APK
        run: gradle assembleDebug
        working-directory: ${{ github.workspace }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AusBuild-Pro-V4
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Rename and Release APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk AusBuild-Pro-V4.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v4.0.3-android
          name: "AusBuild Pro V4.0.3 - Android"
          body: |
            ## AusBuild Pro V4.0.3 - Android APK

            **Changes in v4.0.3:**
            - Fixed: AI Image Generation uses Pollinations.ai (free, no API key)
            - Fixed: No more grey screen verification popup
            - Fixed: All tabs respond to taps on mobile
            - Fixed: Calculator updates in real-time
            - Full responsive mobile layout
            - Design AI with real FLUX AI image generation
            - Complete Pro version: no watermark, no trial banners

            **Install:** Download AusBuild-Pro-V4.apk and install on Android.
          files: AusBuild-Pro-V4.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
