name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android project
        run: |
          mkdir -p app/src/main/java/com/ausbuild/pro
          mkdir -p app/src/main/res/{layout,values,drawable,mipmap-hdpi}
          mkdir -p app/src/main/assets

      - name: Prepare mobile HTML
        run: |
          cp AusBuild-Pro-V4-Free.html app/src/main/assets/index.html
          python3 -c "
          with open('app/src/main/assets/index.html','r') as f: html=f.read()
          html=html.replace('<script src=\"https://cdn.tailwindcss.com\"></script>','<script src=\"https://cdn.tailwindcss.com\"></script>\n<script src=\"https://js.puter.com/v2/\"></script>')
          html=html.replace('width=device-width, initial-scale=1.0','width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no')
          css='@media(max-width:768px){nav{flex-wrap:wrap;height:auto!important;padding:8px 12px!important;gap:6px}nav>div:first-child{width:100%%;text-align:center}#nav-tabs{width:100%%;display:flex;justify-content:center;gap:4px;overflow-x:auto}#nav-tabs .tab-btn{padding:6px 12px!important;font-size:11px!important;white-space:nowrap}nav>div:last-child{display:none}#tab-calc>div,#tab-design>div,#tab-quote>div{flex-direction:column!important;overflow-y:auto!important}body{overflow:auto!important;height:auto!important;min-height:100vh}select,input,button{font-size:14px!important;min-height:36px}}*{-webkit-tap-highlight-color:transparent}'
          html=html.replace('</style>',css+'\n</style>')
          html=html.replace('h-screen flex flex-col overflow-hidden','min-h-screen flex flex-col')
          with open('app/src/main/assets/index.html','w') as f: f.write(html)
          print('HTML modified successfully')
          "

      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.ausbuild.pro">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
            <application android:allowBackup="true" android:label="AusBuild Pro V4"
              android:theme="@style/AppTheme" android:usesCleartextTraffic="true"
              android:hardwareAccelerated="true">
              <activity android:name=".MainActivity" android:exported="true"
                android:configChanges="orientation|screenSize|keyboardHidden">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

      - name: Create MainActivity.java
        run: |
          cat > app/src/main/java/com/ausbuild/pro/MainActivity.java << 'EOF'
          package com.ausbuild.pro;
          import android.app.Activity;
          import android.graphics.Color;
          import android.os.Build;
          import android.os.Bundle;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.*;
          public class MainActivity extends Activity {
            private WebView webView;
            @Override protected void onCreate(Bundle b) {
              super.onCreate(b);
              requestWindowFeature(Window.FEATURE_NO_TITLE);
              getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN,WindowManager.LayoutParams.FLAG_FULLSCREEN);
              if(Build.VERSION.SDK_INT>=Build.VERSION_CODES.LOLLIPOP)getWindow().setStatusBarColor(Color.parseColor("#0d1b3e"));
              webView=new WebView(this);setContentView(webView);
              WebSettings s=webView.getSettings();
              s.setJavaScriptEnabled(true);s.setDomStorageEnabled(true);
              s.setAllowFileAccess(true);s.setLoadWithOverviewMode(true);
              s.setUseWideViewPort(true);s.setDatabaseEnabled(true);
              s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
              if(Build.VERSION.SDK_INT>=Build.VERSION_CODES.LOLLIPOP)CookieManager.getInstance().setAcceptThirdPartyCookies(webView,true);
              webView.setWebViewClient(new WebViewClient());
              webView.setWebChromeClient(new WebChromeClient());
              webView.loadUrl("file:///android_asset/index.html");
            }
            @Override public void onBackPressed(){if(webView!=null&&webView.canGoBack())webView.goBack();else super.onBackPressed();}
          }
          EOF

      - name: Create resource files
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">AusBuild Pro V4</string></resources>
          EOF
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="android:Theme.Material.Light.NoActionBar">
              <item name="android:statusBarColor">#0d1b3e</item>
              <item name="android:navigationBarColor">#0d1b3e</item>
            </style>
          </resources>
          EOF

      - name: Create Gradle files
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > settings.gradle << 'EOF'
          rootProject.name = 'AusBuildProV4'
          include ':app'
          EOF
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=false
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.ausbuild.pro'
            compileSdk 34
            defaultConfig {
              applicationId "com.ausbuild.pro"
              minSdk 24
              targetSdk 34
              versionCode 1
              versionName "4.0"
            }
            buildTypes { release { minifyEnabled false } }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_11
              targetCompatibility JavaVersion.VERSION_11
            }
          }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.2
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AusBuild-Pro-V4-Android
          path: app/build/outputs/apk/debug/app-debug.apk
