name: Build Android APK & AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.2

      - name: Create Android project structure
        run: |
          mkdir -p app/src/main/java/com/ausbuild/pro
          mkdir -p app/src/main/res/{layout,values,drawable,mipmap-hdpi,mipmap-xhdpi,mipmap-xxhdpi}
          mkdir -p app/src/main/assets

      - name: Prepare mobile HTML
        run: |
          # Copy the Pro version of the HTML
          if [ -f "AusBuild-Pro-V4-Pro.html" ]; then
            cp AusBuild-Pro-V4-Pro.html app/src/main/assets/index.html
          elif [ -f "AusBuild-Pro-V4-Free.html" ]; then
            cp AusBuild-Pro-V4-Free.html app/src/main/assets/index.html
          fi
          # Add mobile viewport and responsive CSS
          python3 -c "
          with open('app/src/main/assets/index.html','r') as f: html=f.read()
          html=html.replace('width=device-width, initial-scale=1.0','width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no')
          css='*{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}'
          html=html.replace('</style>',css+'\n</style>',1)
          html=html.replace('h-screen flex flex-col overflow-hidden','min-h-screen flex flex-col')
          with open('app/src/main/assets/index.html','w') as f: f.write(html)
          print('HTML prepared for mobile')
          "

      - name: Compile TailwindCSS for offline use
        run: |
          npm install tailwindcss@3
          echo '@tailwind base;
          @tailwind components;
          @tailwind utilities;' > input.css
          cat > tailwind.config.js << 'TWEOF'
          module.exports = {
            content: ['./app/src/main/assets/index.html'],
            theme: {
              extend: {
                colors: {
                  navy: {
                    '50':'#e6eaf2','100':'#c0c9de','200':'#96a5c8',
                    '300':'#6c81b2','400':'#4d66a2','500':'#2e4b93',
                    '600':'#29448b','700':'#1f3a80','800':'#173175','900':'#0d1b3e'
                  }
                }
              }
            }
          }
          TWEOF
          npx tailwindcss -i input.css -o compiled.css --minify
          echo "Compiled CSS size: $(wc -c < compiled.css) bytes"
          # Replace CDN script tags with compiled CSS
          python3 -c "
          import re
          with open('app/src/main/assets/index.html','r') as f: html=f.read()
          with open('compiled.css','r') as f: css=f.read()
          # Remove CDN script tag
          html=re.sub(r'<script src=\"https://cdn\.tailwindcss\.com\"></script>\s*','',html)
          # Remove tailwind config script
          html=re.sub(r'<script>tailwindcss\.config=\{.*?\}</script>\s*','',html)
          # Insert compiled CSS before existing style block
          html=html.replace('<style>','<style>\n'+css+'\n',1)
          with open('app/src/main/assets/index.html','w') as f: f.write(html)
          print('TailwindCSS compiled and inlined successfully')
          "

      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.ausbuild.pro">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
            <application
                android:allowBackup="true"
                android:label="AusBuild Pro V4"
                android:theme="@style/AppTheme"
                android:usesCleartextTraffic="true"
                android:hardwareAccelerated="true"
                android:supportsRtl="true">
              <activity
                  android:name=".MainActivity"
                  android:exported="true"
                  android:configChanges="orientation|screenSize|keyboardHidden"
                  android:screenOrientation="unspecified">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

      - name: Create MainActivity.java
        run: |
          cat> app/src/main/java/com/ausbuild/pro/MainActivity.java << 'JAVAEOF'
          package com.ausbuild.pro;

          import android.app.Activity;
          import android.graphics.Color;
          import android.os.Build;
          import android.os.Bundle;
          import android.view.View;
          import android.view.Window;
          import android.view.WindowManager;
          import android.webkit.CookieManager;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              private WebView webView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);

                  // Modern fullscreen for API 30+, fallback for older
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      getWindow().setDecorFitsSystemWindows(false);
                      getWindow().getInsetsController().hide(
                          android.view.WindowInsets.Type.statusBars() |
                          android.view.WindowInsets.Type.navigationBars()
                      );
                      getWindow().getInsetsController().setSystemBarsBehavior(
                          android.view.WindowInsetsController.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE
                      );
                  } else {
                      getWindow().setFlags(
                          WindowManager.LayoutParams.FLAG_FULLSCREEN,
                          WindowManager.LayoutParams.FLAG_FULLSCREEN
                      );
                      getWindow().getDecorView().setSystemUiVisibility(
                          View.SYSTEM_UI_FLAG_LAYOUT_STABLE |
                          View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN |
                          View.SYSTEM_UI_FLAG_FULLSCREEN |
                          View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                      );
                  }

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                      getWindow().setStatusBarColor(Color.parseColor("#0d1b3e"));
                      getWindow().setNavigationBarColor(Color.parseColor("#0d1b3e"));
                  }

                  webView = new WebView(this);
                  setContentView(webView);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setDatabaseEnabled(true);
                  settings.setBuiltInZoomControls(false);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                      CookieManager.getInstance().setAcceptThirdPartyCookies(webView, true);
                  }

                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }

              @Override
              protected void onPause() {
                  super.onPause();
                  if (webView != null) {
                      webView.onPause();
                      webView.pauseTimers();
                  }
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  if (webView != null) {
                      webView.onResume();
                      webView.resumeTimers();
                  }
              }

              @Override
              protected void onDestroy() {
                  if (webView != null) {
                      webView.stopLoading();
                      webView.clearHistory();
                      webView.clearCache(true);
                      webView.loadUrl("about:blank");
                      webView.onPause();
                      webView.removeAllViews();
                      webView.destroyDrawingCache();
                      webView.destroy();
                      webView = null;
                  }
                  super.onDestroy();
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          JAVAEOF

      - name: Create resource files
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">AusBuild Pro V4</string>
          </resources>
          EOF
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="android:Theme.Material.Light.NoActionBar">
              <item name="android:statusBarColor">#0d1b3e</item>
              <item name="android:navigationBarColor">#0d1b3e</item>
              <item name="android:windowFullscreen">true</item>
            </style>
          </resources>
          EOF

      - name: Create Gradle files
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > settings.gradle << 'EOF'
          rootProject.name = 'AusBuildProV4'
          include ':app'
          EOF
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=false
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.ausbuild.pro'
            compileSdk 34
            defaultConfig {
              applicationId "com.ausbuild.pro"
              minSdk 24
              targetSdk 34
              versionCode 1
              versionName "4.0"
            }
            signingConfigs {
              release {
                storeFile file("release-keystore.jks")
                storePassword System.getenv("KEYSTORE_PASSWORD") ?: "ausbuild2024"
                keyAlias System.getenv("KEY_ALIAS") ?: "ausbuild"
                keyPassword System.getenv("KEY_PASSWORD") ?: "ausbuild2024"
              }
            }
            buildTypes {
              release {
                minifyEnabled true
                shrinkResources true
                proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                signingConfig signingConfigs.release
              }
              debug {
                debuggable true
              }
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_11
              targetCompatibility JavaVersion.VERSION_11
            }
          }
          EOF
          # Create proguard rules
          cat > app/proguard-rules.pro << 'EOF'
          -keepclassmembers class * {
              @android.webkit.JavascriptInterface <methods>;
          }
          -keepattributes JavascriptInterface
          -keep class android.webkit.** { *; }
          EOF

      - name: Generate signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/release-keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias ${KEY_ALIAS:-ausbuild} \
            -storepass ${KEYSTORE_PASSWORD:-ausbuild2024} \
            -keypass ${KEY_PASSWORD:-ausbuild2024} \
            -dname "CN=AusBuild Pro, OU=Development, O=AusBuild, L=Perth, ST=WA, C=AU"

      - name: Build Release APK and AAB
        run: |
          gradle wrapper
          ./gradlew assembleRelease bundleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AusBuild-Pro-V4-Release-APK
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload Release AAB (for Google Play)
        uses: actions/upload-artifact@v4
        with:
          name: AusBuild-Pro-V4-Release-AAB
          path: app/build/outputs/bundle/release/app-release.aab

