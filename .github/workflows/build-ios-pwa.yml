name: Build iOS PWA

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create PWA Package
        run: |
          mkdir -p pwa-build/icons
          cp AusBuild-Pro-V4-Free.html pwa-build/source.html

          # Process HTML with Python via stdin
          python3 << 'PYEOF'
          import re
          with open('pwa-build/source.html', 'r') as f:
              html = f.read()
          html = re.sub(r'<span[^>]*>FREE TRIAL</span>', '', html)
          html = re.sub(r'<div class=.watermark-overlay.></div>', '', html)
          html = html.replace('Free Trial', 'Pro')
          pwa_meta = '<link rel="manifest" href="manifest.json">\n'
          pwa_meta += '<meta name="apple-mobile-web-app-capable" content="yes">\n'
          pwa_meta += '<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">\n'
          pwa_meta += '<meta name="apple-mobile-web-app-title" content="AusBuild Pro">\n'
          pwa_meta += '<link rel="apple-touch-icon" href="icons/icon-192.png">\n'
          pwa_meta += '<meta name="theme-color" content="#0d1b3e">\n'
          html = html.replace('</head>', pwa_meta + '</head>')
          sw_reg = '<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js")}</script>'
          html = html.replace('</body>', sw_reg + '</body>')
          with open('pwa-build/index.html', 'w') as f:
              f.write(html)
          print("HTML processed OK")
          PYEOF

          # Create manifest.json
          cat > pwa-build/manifest.json << 'MANIFEST'
          {
            "name": "AusBuild Pro V4",
            "short_name": "AusBuild",
            "description": "Professional lot yield calculator and AI design renderer",
            "start_url": "./index.html",
            "display": "standalone",
            "orientation": "portrait",
            "background_color": "#0d1b3e",
            "theme_color": "#0d1b3e",
            "icons": [
              {"src": "icons/icon-192.png", "sizes": "192x192", "type": "image/png"},
              {"src": "icons/icon-512.png", "sizes": "512x512", "type": "image/png"}
            ]
          }
          MANIFEST

          # Create service worker
          cat > pwa-build/sw.js << 'SW'
          const CACHE = 'ausbuild-v4';
          const ASSETS = ['./index.html', './manifest.json'];
          self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
          self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
          SW

          # Generate icons with flat Python (no function defs, no indentation issues)
          python3 << 'ICONEOF'
          import struct, zlib, os
          os.makedirs('pwa-build/icons', exist_ok=True)
          for size, name in [(192, 'icon-192'), (512, 'icon-512')]:
              raw = b''
              for y in range(size):
                  raw += b'\x00'
                  for x in range(size):
                      cx = x - size // 2
                      cy = y - size // 2
                      r = size // 3
                      if cx * cx + cy * cy < r * r:
                          raw += bytes([30, 64, 120, 255])
                      else:
                          raw += bytes([13, 27, 62, 255])
              ihdr = struct.pack('>IIBBBBB', size, size, 8, 6, 0, 0, 0)
              idat = zlib.compress(raw)
              out = b'\x89PNG\r\n\x1a\n'
              for ctype, data in [(b'IHDR', ihdr), (b'IDAT', idat), (b'IEND', b'')]:
                  c = ctype + data
                  out += struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              with open(f'pwa-build/icons/{name}.png', 'wb') as f:
                  f.write(out)
          print('Icons generated OK')
          ICONEOF

          echo "PWA build complete"
          ls -la pwa-build/

      - name: Upload PWA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AusBuild-Pro-V4-PWA
          path: pwa-build/
          retention-days: 90
